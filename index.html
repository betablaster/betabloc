<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BetaBloc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Figtree:wght@400;500;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;--s1:#0f0f0f;--s2:#161616;--s3:#1e1e1e;
  --border:rgba(255,255,255,0.07);--border-hi:rgba(255,255,255,0.15);
  --text:#F0EBE0;--muted:#5a5550;--muted-hi:#8a8480;
  --accent:#BFFF4A;--accent-text:#080808;
  --slab:#89CFF0;--coord:#FFB347;--power:#FF6464;--joker:#C8A8FF;
  --watched-opacity:0.45;
  --hdr:52px;--r:6px;--ease:cubic-bezier(0.16,1,0.3,1);
  font-family:'Figtree',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overscroll-behavior:none}
body{background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;font-size:14px}
body::before{content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,0.022) 1px,transparent 1px);
  background-size:24px 24px;pointer-events:none;z-index:0}
*{position:relative}

/* SETUP OVERLAY */
.setup{position:fixed;inset:0;z-index:1000;background:var(--bg);
  display:flex;align-items:center;justify-content:center;padding:24px}
.setup.gone{display:none}
.setup-card{width:100%;max-width:480px}
.setup-logo{font-family:'Russo One',sans-serif;font-size:13px;letter-spacing:.28em;
  color:var(--accent);margin-bottom:8px}
.setup-tagline{font-size:12px;color:var(--muted-hi);letter-spacing:.08em;margin-bottom:28px}
.setup-h{font-family:'Russo One',sans-serif;font-size:28px;letter-spacing:.05em;
  line-height:1.1;margin-bottom:8px}
.setup-sub{font-size:13px;color:var(--muted-hi);line-height:1.6;margin-bottom:32px}
.steps{display:flex;flex-direction:column;gap:14px;margin-bottom:28px}
.step{display:flex;gap:14px;align-items:flex-start}
.step-n{font-family:'Russo One',sans-serif;font-size:11px;letter-spacing:.1em;
  color:var(--accent);background:var(--accent-text);
  width:22px;height:22px;border-radius:50%;display:grid;place-items:center;
  border:1px solid var(--accent);flex-shrink:0;margin-top:1px}
.step-n{background:var(--accent-bg);color:var(--accent)}
.step-t{font-size:13px;line-height:1.55}
.step-t code{font-family:'Fira Code',monospace;font-size:12px;
  background:var(--s3);padding:1px 6px;border-radius:3px;color:var(--accent)}
.step-t small{display:block;color:var(--muted-hi);font-size:12px;margin-top:2px}
.url-row{display:flex;gap:8px}
.url-input{
  flex:1;background:var(--s2);border:1px solid var(--border-hi);border-radius:var(--r);
  color:var(--text);font-family:'Fira Code',monospace;font-size:12px;padding:10px 14px;
  outline:none;transition:border-color .15s;
}
.url-input:focus{border-color:var(--accent)}
.url-input::placeholder{color:var(--muted)}
.connect-btn{
  padding:10px 20px;border-radius:var(--r);border:0;
  background:var(--accent);color:var(--accent-text);
  font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:.08em;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:background .13s,transform .13s var(--ease);
}
.connect-btn:hover{background:#d0ff5a;transform:translateY(-1px)}
.connect-btn:disabled{opacity:.5;cursor:default;transform:none}
.setup-err{font-size:12px;color:#FF6464;margin-top:10px;min-height:18px;line-height:1.5}
.setup-err a{color:#FF9898}

/* HEADER */
.hdr{position:sticky;top:0;z-index:200;height:var(--hdr);
  display:flex;align-items:center;justify-content:space-between;padding:0 18px;
  background:rgba(8,8,8,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.logo{font-family:'Russo One',sans-serif;font-size:16px;letter-spacing:.04em;color:var(--accent)}
.hdr-nav{display:flex;align-items:center;gap:8px}
.hdr-btn{font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;
  color:var(--muted-hi);text-decoration:none;padding:6px 13px;
  border:1px solid var(--border);border-radius:20px;cursor:pointer;background:transparent;
  transition:color .15s,border-color .15s}
.hdr-btn:hover{color:var(--text);border-color:var(--border-hi)}
.hdr-btn.hi{border-color:var(--accent);color:var(--accent)}
.hdr-btn.hi:hover{background:var(--accent);color:#080808}
.spin-ico{display:inline-block;transition:transform .3s}
.hdr-btn:active .spin-ico{transform:rotate(180deg)}

/* RESUME BANNER */
.resume-bar{display:none;align-items:center;gap:12px;padding:9px 18px;
  background:rgba(191,255,74,0.08);border-bottom:1px solid rgba(191,255,74,0.15);
  cursor:pointer;transition:background .15s}
.resume-bar:hover{background:rgba(191,255,74,0.13)}
.resume-bar.show{display:flex}
.resume-ico{font-size:16px;flex-shrink:0}
.resume-txt{flex:1;font-size:12px;color:var(--muted-hi);line-height:1.4}
.resume-txt strong{color:var(--accent);font-weight:600}
.resume-action{font-family:'Russo One',sans-serif;font-size:10px;letter-spacing:.1em;
  color:var(--accent);flex-shrink:0}

/* LAYOUT */
.layout{display:flex;flex-direction:column;min-height:calc(100vh - var(--hdr))}
@media(min-width:1024px){
  .layout{flex-direction:row;height:calc(100vh - var(--hdr));overflow:hidden}
  .player-col{flex:0 0 64%;display:flex;flex-direction:column;overflow:hidden}
  .queue-col{flex:1;display:flex;flex-direction:column;border-left:1px solid var(--border);overflow:hidden}
}

/* VIDEO — sticky on mobile portrait */
.video-wrap{background:#000;position:relative;aspect-ratio:16/9;flex-shrink:0}
@media(max-width:1023px){
  .video-wrap{position:sticky;top:var(--hdr);z-index:100}
}
@media(min-width:1024px){.video-wrap{flex:1;aspect-ratio:unset}}
#yt-player,#yt-player iframe{width:100%;height:100%;display:block;border:0;position:absolute;inset:0}

/* TRANSITION VEIL — black overlay for crossfade between clips */
.transition-veil{position:absolute;inset:0;z-index:20;background:#000;
  opacity:0;pointer-events:none;transition:opacity 0.18s ease}
.transition-veil.fading-out{opacity:1;pointer-events:none}

.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:14px;background:rgba(0,0,0,0.55);z-index:10;cursor:pointer;
  transition:opacity .2s var(--ease)}
.overlay.gone{opacity:0;pointer-events:none}
.play-ring{width:68px;height:68px;border-radius:50%;border:1.5px solid var(--accent);
  display:flex;align-items:center;justify-content:center;
  background:rgba(8,8,8,0.6);backdrop-filter:blur(4px);
  transition:transform .18s var(--ease),background .18s}
.overlay:hover .play-ring{transform:scale(1.1);background:var(--accent)}
.play-ring svg{width:22px;height:22px;fill:var(--accent);margin-left:3px;transition:fill .18s}
.overlay:hover .play-ring svg{fill:#080808}
.overlay-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(240,235,224,0.45)}
.done-msg{display:none;position:absolute;inset:0;z-index:10;align-items:center;
  justify-content:center;flex-direction:column;gap:10px;background:rgba(0,0,0,0.8)}
.done-msg.show{display:flex}
.done-t{font-family:'Russo One',sans-serif;font-size:22px;letter-spacing:.1em;color:var(--accent)}
.done-s{font-size:12px;color:var(--muted-hi);letter-spacing:.06em;cursor:pointer;
  border:1px solid var(--border);padding:5px 14px;border-radius:20px;margin-top:4px}
.err-strip{display:none;position:absolute;bottom:0;left:0;right:0;z-index:30;
  background:#1c0a0a;color:#ffc0b0;font-family:'Fira Code',monospace;
  font-size:11px;padding:9px 14px;border-top:1px solid rgba(255,80,50,.25);line-height:1.5}
.err-strip a{color:#ff9f80}

/* SWIPE HINT ARROWS — shown briefly on first interaction */
.swipe-hint{position:absolute;inset:0;z-index:15;pointer-events:none;
  display:flex;align-items:center;justify-content:space-between;padding:0 18px;
  opacity:0;transition:opacity .3s}
.swipe-hint.show{opacity:1}
.sh-arrow{font-size:28px;color:rgba(255,255,255,0.35)}

/* META */
.meta-bar{display:flex;align-items:center;gap:7px;padding:10px 18px;flex-shrink:0;
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  border-bottom:1px solid var(--border);color:var(--muted-hi)}
.meta-sep{opacity:.3;font-size:10px}
.meta-ev{color:var(--text);font-weight:600}

/* CONTROLS */
.ctrl-bar{display:flex;align-items:center;gap:8px;padding:10px 18px;
  border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
.cb{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);cursor:pointer;display:grid;place-items:center;
  width:40px;height:40px;transition:border-color .12s,background .12s;flex-shrink:0}
.cb svg{width:16px;height:16px;fill:var(--text)}
.cb:hover{border-color:var(--border-hi);background:var(--s3)}
.cb:disabled{opacity:.25;cursor:default}
.cb-play{flex:1;display:flex;align-items:center;gap:8px;padding:0 14px;
  background:var(--s2);border:1px solid var(--border);border-radius:var(--r);height:40px;
  font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:.08em;
  color:var(--text);cursor:pointer;transition:border-color .12s,background .12s}
.cb-play:hover{border-color:var(--border-hi);background:var(--s3)}
.cb-play svg{width:14px;height:14px;fill:var(--text)}
.ctrl-ctr{font-family:'Fira Code',monospace;font-size:11px;color:var(--muted-hi);flex-shrink:0}

/* FILTER DRAWER — collapsible panel above clip list */
.filter-toggle{display:flex;align-items:center;gap:8px;padding:9px 18px;
  cursor:pointer;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;
  transition:background .12s;user-select:none}
.filter-toggle:hover{background:var(--s1)}
.ft-label{font-family:'Russo One',sans-serif;font-size:10px;letter-spacing:.14em;
  color:var(--muted-hi);flex:1}
.ft-badges{display:flex;gap:4px;align-items:center}
.ft-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:10px;
  font-size:10px;font-family:'Fira Code',monospace;border:1px solid var(--border);
  color:var(--muted-hi);background:var(--s2)}
.ft-badge.active{border-color:var(--accent);color:var(--accent);background:rgba(191,255,74,0.08)}
.ft-chevron{font-size:12px;color:var(--muted);transition:transform .2s var(--ease)}
.ft-chevron.open{transform:rotate(180deg)}
.ft-count{font-family:'Fira Code',monospace;font-size:9px;background:var(--accent);
  color:#080808;border-radius:8px;padding:1px 5px;display:none}
.ft-count.show{display:inline-block}

.filter-panel{overflow:hidden;transition:max-height .22s var(--ease);max-height:0;flex-shrink:0}
.filter-panel.open{max-height:300px}
.filter-inner{padding:12px 18px 14px;display:flex;flex-direction:column;gap:10px;
  border-bottom:1px solid var(--border)}

.filter-row{display:flex;flex-direction:column;gap:6px}
.filter-row-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600}
.pill-row{display:flex;gap:4px;flex-wrap:wrap}
.pill{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;
  padding:4px 11px;border-radius:20px;cursor:pointer;
  border:1px solid var(--border);background:transparent;
  font-family:'Russo One',sans-serif;font-size:10px;letter-spacing:.1em;
  color:var(--muted-hi);white-space:nowrap;transition:color .13s,border-color .13s,background .13s}
.pill:hover{color:var(--text);border-color:var(--border-hi)}
.pill.on{background:var(--accent);color:#080808;border-color:var(--accent)}
.pill.on-color{color:#fff;border-color:currentColor}
.cdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cnt{font-family:'Fira Code',monospace;font-size:10px;opacity:.65}
.pill.on .cnt{opacity:.7;color:#080808}
.pill.on-color .cnt{opacity:.7}

/* Watched filter pill special styling */
.pill.watched-pill.on{background:transparent;color:var(--accent);border-color:var(--accent)}

/* CLIP LIST */
.clip-scroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--s3) transparent}
.clip-scroll::-webkit-scrollbar{width:4px}
.clip-scroll::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.clip-list{list-style:none}
.clip-card{display:flex;align-items:center;gap:14px;padding:15px 18px;cursor:pointer;
  border-bottom:1px solid var(--border);transition:background .1s,opacity .2s;position:relative}
.clip-card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--accent);opacity:0;transition:opacity .15s}
.clip-card:hover{background:var(--s1)}
.clip-card.on{background:var(--s2)}
.clip-card.on::after{opacity:1}
.clip-card.on .cnum{color:var(--accent)}
.clip-card.watched{opacity:var(--watched-opacity)}
.clip-card.watched:hover{opacity:0.8}
.clip-card.on.watched{opacity:1}
.cnum{font-family:'Russo One',sans-serif;font-size:38px;line-height:1;
  color:rgba(255,255,255,0.12);min-width:44px;transition:color .15s}
.clip-card:hover .cnum{color:rgba(255,255,255,0.28)}
.cinf{flex:1;min-width:0}
.cwho{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmeta{font-size:11px;color:var(--muted-hi);margin-top:2px;letter-spacing:.04em}
.cside{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.cdur{font-family:'Fira Code',monospace;font-size:11.5px;color:var(--muted-hi)}
.catdot{width:8px;height:8px;border-radius:50%}
.watched-check{font-size:10px;color:var(--muted);line-height:1}

/* STATES */
.state-box{padding:48px 24px;text-align:center;display:none}
.state-box.show{display:block}
.state-h{font-family:'Russo One',sans-serif;font-size:17px;letter-spacing:.1em;color:var(--muted);margin-bottom:10px}
.state-p{font-size:13px;color:var(--muted);line-height:1.65;max-width:240px;margin:0 auto}
.state-p a{color:var(--accent);text-decoration:none}
.spinner{width:22px;height:22px;border:2px solid var(--s3);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- DIST: no setup overlay — sheet URL is hardcoded -->

<!-- APP -->
<header class="hdr">
  <span class="logo">BetaBloc</span>
  <nav class="hdr-nav">
    <button class="hdr-btn" id="refreshBtn" title="Refresh"><span class="spin-ico">↻</span></button>
  </nav>
</header>

<!-- RESUME BANNER -->
<div class="resume-bar" id="resumeBar">
  <span class="resume-ico">⏎</span>
  <div class="resume-txt">
    <strong id="resumeTitle">—</strong><br>
    Jump back in where you left off
  </div>
  <span class="resume-action">RESUME →</span>
</div>

<div class="layout">
  <div class="player-col">
    <div class="video-wrap" id="videoWrap">
      <div id="yt-player"></div>
      <!-- Smooth transition veil -->
      <div class="transition-veil" id="transVeil"></div>
      <div class="overlay" id="gate">
        <div class="play-ring"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        <div class="overlay-label">Tap to play</div>
      </div>
      <!-- Swipe hint arrows (shown briefly) -->
      <div class="swipe-hint" id="swipeHint">
        <span class="sh-arrow">‹</span>
        <span class="sh-arrow">›</span>
      </div>
      <div class="done-msg" id="done">
        <div class="done-t">DONE</div>
        <div class="done-s" id="doneReplay">Play again</div>
      </div>
      <div class="err-strip" id="errStr"></div>
    </div>
    <div class="meta-bar">
      <span class="meta-ev" id="metaEv">—</span>
      <span class="meta-sep">·</span><span id="metaG">—</span>
      <span class="meta-sep">·</span><span id="metaR">—</span>
    </div>
    <div class="ctrl-bar">
      <button class="cb" id="btnPrev" disabled><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
      <button class="cb-play" id="btnPlay">
        <svg viewBox="0 0 24 24" id="playIco"><path d="M8 5v14l11-7z"/></svg>
        <span id="playLbl">Play</span>
      </button>
      <button class="cb" id="btnNext"><svg viewBox="0 0 24 24"><path d="M18 6h-2v12h2zM6 6v12l8.5-6z"/></svg></button>
      <div class="ctrl-ctr"><span id="cIdx">0</span>/<span id="cTot">0</span></div>
    </div>
  </div>

  <div class="queue-col">
    <!-- Collapsible filter drawer -->
    <div class="filter-toggle" id="filterToggle">
      <span class="ft-label">FILTERS</span>
      <div class="ft-badges" id="ftBadges"></div>
      <span class="ft-count" id="ftCount">0</span>
      <span class="ft-chevron" id="ftChevron">▾</span>
    </div>
    <div class="filter-panel" id="filterPanel">
      <div class="filter-inner">
        <!-- Category row -->
        <div class="filter-row">
          <div class="filter-row-label">Category</div>
          <div class="pill-row" id="catBar"></div>
        </div>
        <!-- Year row -->
        <div class="filter-row">
          <div class="filter-row-label">Year</div>
          <div class="pill-row" id="yearBar"></div>
        </div>
        <!-- Gender row -->
        <div class="filter-row">
          <div class="filter-row-label">Gender</div>
          <div class="pill-row" id="genderBar"></div>
        </div>
        <!-- Stage row -->
        <div class="filter-row">
          <div class="filter-row-label">Stage</div>
          <div class="pill-row" id="stageBar"></div>
        </div>
        <!-- Watched row -->
        <div class="filter-row">
          <div class="filter-row-label">History</div>
          <div class="pill-row" id="watchedBar"></div>
        </div>
      </div>
    </div>

    <div class="clip-scroll">
      <div class="state-box show" id="loadState">
        <div class="spinner"></div>
        <div class="state-h">LOADING</div>
        <p class="state-p">Fetching from Google Sheets…</p>
      </div>
      <ul class="clip-list" id="clipList"></ul>
      <div class="state-box" id="emptyState">
        <div class="state-h">NO SENDS</div>
        <p class="state-p">No boulders match the current filters.<br>Try adjusting your filters above.</p>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══ CONSTANTS ═══════════════════════════════ */
// DIST: sheet URL is hardcoded — no setup screen needed
const SHEET_URL   = 'https://docs.google.com/spreadsheets/d/1LMY-z30LCEJ6A9mxio4pPDzUAnn3H8PthEeTI0K3rs0/edit';
const LS_URL      = 'srSheetUrl';
const LS_WATCHED  = 'pbWatched';
const LS_LAST     = 'pbLastClip';
const lsCat       = id => 'srcat_' + id;

const CATS = {
  all:  {label:'All',  color:null},
  slab: {label:'Slab', color:'#89CFF0'},
  coord:{label:'Coord',color:'#FFB347'},
  power:{label:'Power',color:'#FF6464'},
  joker:{label:'Joker',color:'#C8A8FF'},
};
const fmt = s => {s=Math.max(0,s|0);const h=(s/3600)|0,m=((s%3600)/60)|0,x=s%60;return(h?h+':'+String(m).padStart(2,'0'):m)+':'+String(x).padStart(2,'0')};

/* ═══ WATCHED HISTORY ════════════════════════ */
function getWatched(){try{return new Set(JSON.parse(localStorage.getItem(LS_WATCHED)||'[]'));}catch{return new Set();}}
function saveWatched(s){localStorage.setItem(LS_WATCHED,JSON.stringify([...s]));}
function markWatched(id){const s=getWatched();s.add(id);saveWatched(s);localStorage.setItem(LS_LAST,id);}
function isWatched(id){return getWatched().has(id);}
function getLastClipId(){return localStorage.getItem(LS_LAST)||null;}

/* ═══ URL HELPERS ═════════════════════════════ */
function toCsvUrl(raw) {
  const u = raw.trim();
  if (/output=csv|format=csv/.test(u)) return u;
  const m = u.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return `https://docs.google.com/spreadsheets/d/${m[1]}/gviz/tq?tqx=out:csv&sheet=Boulder%20Log`;
  return u;
}

/* ═══ CSV PARSER ══════════════════════════════ */
function parseCSV(text) {
  text = text.replace(/^\uFEFF/, '');
  const rows = []; let field='', row=[], inQ=false;
  for (let i=0; i<text.length; i++) {
    const c=text[i];
    if (c==='"') { if (inQ && text[i+1]==='"'){field+='"';i++;} else inQ=!inQ; }
    else if (c===',' && !inQ) { row.push(field); field=''; }
    else if ((c==='\n'||c==='\r') && !inQ) {
      if (c==='\r'&&text[i+1]==='\n') i++;
      row.push(field); field=''; if(row.some(Boolean)) rows.push(row); row=[];
    } else field+=c;
  }
  if (field||row.length) { row.push(field); if(row.some(Boolean)) rows.push(row); }
  return rows;
}

function csvToClips(text) {
  const rows = parseCSV(text);
  if (rows.length < 2) return [];
  const hdr = rows[0].map(h=>h.trim().toLowerCase().replace(/[^a-z0-9]+/g,'_'));
  const ci = n => hdr.findIndex(h=>h.includes(n));
  const cYear=ci('year'),cEvent=ci('event'),cGender=ci('gender'),cRound=ci('round');
  const cB=ci('boulder'),cTop=ci('topped'),cWho=ci('climber'),cUrl=ci('broadcast');
  const cStart=ci('start'),cStop=ci('stop'),cCat=ci('category'),cResults=ci('results');
  const clips=[];
  rows.slice(1).forEach(row=>{
    const g=i=>(i>=0&&i<row.length?row[i].trim():'');
    if (g(cTop).toUpperCase()!=='Y') return;
    const start=parseFloat(g(cStart)), stop=parseFloat(g(cStop)), url=g(cUrl);
    if (!url||isNaN(start)||isNaN(stop)||start<=0) return;
    const vm=url.match(/[?&]v=([^&\s]+)/)||url.match(/youtu\.be\/([^?&\s]+)/);
    if (!vm) return;
    const year=g(cYear),event=g(cEvent),gender=g(cGender),round=g(cRound),boulder=g(cB);
    // DIST: clip ID omits raw timestamp — uses a short hash instead
    const _h = s => (Math.imul(2654435761,s|0)>>>0).toString(36).slice(0,5);
    const id=[year,event.replace(/[\s#]+/g,'_'),gender,round,boulder,_h(Math.round(start))].join('_');
    const sheetCat=cCat>=0?g(cCat):null;
    clips.push({id,videoId:vm[1],start,stop,boulder:parseInt(boulder)||0,
      who:g(cWho),event,year,gender,round,
      resultsUrl:cResults>=0?g(cResults):null,
      category:localStorage.getItem(lsCat(id))||sheetCat||null});
  });
  return clips;
}

/* ═══ STATE ═══════════════════════════════════ */
let clips=[], cat='all', idx=0, player=null, ticker=null, isPlaying=false;
// Multi-axis filters
let fYear='all', fGender='all', fStage='all', fWatched='all';

function vis(){
  return clips.filter(c=>{
    if(cat!=='all' && c.category!==cat) return false;
    if(fYear!=='all' && c.year!==fYear) return false;
    if(fGender!=='all' && c.gender!==fGender) return false;
    if(fStage!=='all' && c.round!==fStage) return false;
    if(fWatched==='unwatched' && isWatched(c.id)) return false;
    if(fWatched==='watched'   && !isWatched(c.id)) return false;
    return true;
  });
}

/* ═══ SETUP (DIST — hardcoded, no user config) ═ */
function savedUrl(){ return SHEET_URL; }

async function refreshData() {
  document.getElementById('loadState').classList.add('show');
  document.getElementById('clipList').innerHTML='';
  document.getElementById('emptyState').classList.remove('show');
  try {
    const r=await fetch(toCsvUrl(SHEET_URL)+'&_='+Date.now());
    const text=await r.text();
    clips=csvToClips(text); buildAllFilters(); buildList();
    if (ytReady && !player && clips.length) initPlayer();
    buildResumeBanner();
  } catch(e) { showErr('Could not load data. Check your connection and try refreshing.'); }
  finally { document.getElementById('loadState').classList.remove('show'); }
}
document.getElementById('refreshBtn').onclick=()=>refreshData();

/* ═══ FILTER TOGGLE ═══════════════════════════ */
let filterOpen = false;
document.getElementById('filterToggle').onclick = () => {
  filterOpen = !filterOpen;
  document.getElementById('filterPanel').classList.toggle('open', filterOpen);
  document.getElementById('ftChevron').classList.toggle('open', filterOpen);
};

/* ═══ FILTER UI ═══════════════════════════════ */
function buildAllFilters(){
  buildCatFilter();
  buildAxisFilter('yearBar',   [...new Set(clips.map(c=>c.year))].sort(),   ()=>fYear,   v=>{fYear=v;   applyFilters();});
  buildAxisFilter('genderBar', [...new Set(clips.map(c=>c.gender))].sort(), ()=>fGender, v=>{fGender=v;  applyFilters();});
  buildAxisFilter('stageBar',  [...new Set(clips.map(c=>c.round))].sort(),  ()=>fStage,  v=>{fStage=v;  applyFilters();});
  buildWatchedFilter();
  updateFilterBadges();
}

function buildCatFilter(){
  const bar=document.getElementById('catBar'); bar.innerHTML='';
  Object.entries(CATS).forEach(([k,{label,color}])=>{
    const n=k==='all'?clips.length:clips.filter(c=>c.category===k).length;
    if(k!=='all' && n===0) return;
    const el=document.createElement('button');
    el.className='pill'+(k===cat?' on':'');
    el.innerHTML=(color?`<span class="cdot" style="background:${color}"></span>`:'')+`${label}<span class="cnt">${n}</span>`;
    el.onclick=()=>{cat=k;idx=0;buildCatFilter();applyFilters();};
    bar.appendChild(el);
  });
}

function buildAxisFilter(barId, values, getVal, setVal){
  const bar=document.getElementById(barId); bar.innerHTML='';
  const cur=getVal();
  // All pill
  const allEl=document.createElement('button');
  allEl.className='pill'+(cur==='all'?' on':'');
  allEl.textContent='All';
  allEl.onclick=()=>{setVal('all');buildAllFilters();};
  bar.appendChild(allEl);
  values.forEach(v=>{
    const el=document.createElement('button');
    el.className='pill'+(cur===v?' on':'');
    el.textContent=v;
    el.onclick=()=>{setVal(v);idx=0;buildAllFilters();};
    bar.appendChild(el);
  });
}

function buildWatchedFilter(){
  const bar=document.getElementById('watchedBar'); bar.innerHTML='';
  const opts=[['all','All'],['unwatched','Unseen'],['watched','Seen']];
  opts.forEach(([k,label])=>{
    const el=document.createElement('button');
    el.className='pill watched-pill'+(fWatched===k?' on':'');
    el.textContent=label;
    el.onclick=()=>{fWatched=k;idx=0;buildAllFilters();applyFilters();};
    bar.appendChild(el);
  });
}

function updateFilterBadges(){
  const badges=document.getElementById('ftBadges');
  badges.innerHTML='';
  const active=[];
  if(cat!=='all') active.push(CATS[cat]?.label||cat);
  if(fYear!=='all') active.push(fYear);
  if(fGender!=='all') active.push(fGender);
  if(fStage!=='all') active.push(fStage);
  if(fWatched!=='all') active.push(fWatched==='unwatched'?'Unseen':'Seen');
  active.forEach(a=>{
    const b=document.createElement('span');
    b.className='ft-badge active'; b.textContent=a;
    badges.appendChild(b);
  });
  const countEl=document.getElementById('ftCount');
  countEl.textContent=active.length;
  countEl.classList.toggle('show', active.length>0);
}

function applyFilters(){
  updateFilterBadges();
  const list=document.getElementById('clipList');
  list.style.opacity='0';
  setTimeout(()=>{buildList();list.style.transition='opacity .15s';list.style.opacity='1';},140);
}

/* ═══ RESUME BANNER ═══════════════════════════ */
function buildResumeBanner(){
  const lastId=getLastClipId(); if(!lastId) return;
  const c=clips.find(x=>x.id===lastId); if(!c) return;
  const bar=document.getElementById('resumeBar');
  document.getElementById('resumeTitle').textContent=`${c.who||'Climber'} · B${c.boulder} · ${c.event} ${c.year}`;
  bar.classList.add('show');
  bar.onclick=()=>{
    // reset filters and jump to clip
    cat='all';fYear='all';fGender='all';fStage='all';fWatched='all';
    buildAllFilters();
    buildList();
    const v=vis();
    const i=v.findIndex(x=>x.id===lastId);
    if(i>=0){idx=i;startClip(i);}
    bar.classList.remove('show');
  };
}

/* ═══ LIST UI ═════════════════════════════════ */
function buildList(){
  const list=document.getElementById('clipList'),empty=document.getElementById('emptyState');
  const v=vis(); list.innerHTML='';
  document.getElementById('cTot').textContent=v.length;
  document.getElementById('loadState').classList.remove('show');
  if(!v.length){empty.classList.add('show');return;}
  empty.classList.remove('show');
  v.forEach((c,i)=>{
    const watched=isWatched(c.id);
    const li=document.createElement('li');
    li.className='clip-card'+(i===idx&&isPlaying?' on':'')+(watched?' watched':'');
    li.innerHTML=`<div class="cnum">0${c.boulder}</div>
      <div class="cinf">
        <div class="cwho">${c.who||'—'}</div>
        <div class="cmeta">${c.event} ${c.year} · ${c.gender} · ${c.round}</div>
      </div>
      <div class="cside">
        <div class="cdur">${fmt(c.stop-c.start)}</div>
        ${c.category?`<div class="catdot" style="background:${CATS[c.category]?.color||'#fff'}"></div>`:''}
        ${watched?`<div class="watched-check">✓</div>`:''}
      </div>`;
    li.onclick=()=>{if(player)startClip(i);};
    list.appendChild(li);
  });
  document.getElementById('cIdx').textContent=v.length?idx+1:0;
  document.getElementById('btnPrev').disabled=idx===0;
  document.getElementById('btnNext').disabled=idx>=v.length-1;
  const c=v[idx];
  document.getElementById('metaEv').textContent=c?`${c.event} ${c.year}`:'—';
  document.getElementById('metaG').textContent=c?.gender||'—';
  document.getElementById('metaR').textContent=c?.round||'—';
  // auto-scroll active card into view
  const activeCard=list.children[idx];
  if(activeCard) activeCard.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function setActive(){
  document.querySelectorAll('.clip-card').forEach((el,i)=>el.classList.toggle('on',i===idx&&isPlaying));
  const v=vis();
  document.getElementById('cIdx').textContent=v.length?idx+1:0;
  document.getElementById('btnPrev').disabled=idx===0;
  document.getElementById('btnNext').disabled=idx>=v.length-1;
  const c=v[idx];
  document.getElementById('metaEv').textContent=c?`${c.event} ${c.year}`:'—';
  document.getElementById('metaG').textContent=c?.gender||'—';
  document.getElementById('metaR').textContent=c?.round||'—';
}
function setPlayUI(p){
  isPlaying=p;
  document.getElementById('playLbl').textContent=p?'Pause':'Play';
  document.getElementById('playIco').querySelector('path').setAttribute('d',p?'M6 5h4v14H6zm8 0h4v14h-4z':'M8 5v14l11-7z');
}

/* ═══ SMOOTH TRANSITIONS ══════════════════════ */
const veil = document.getElementById('transVeil');
let veilTimeout = null;

function fadeToClip(loadFn){
  // Phase 1: fade to black (~180ms)
  veil.style.transition = 'opacity 0.18s ease';
  veil.style.opacity = '1';
  veil.style.pointerEvents = 'none';
  clearTimeout(veilTimeout);
  // Also ramp volume down if possible
  if(player?.setVolume) { try{ player.setVolume(0); }catch(e){} }
  veilTimeout = setTimeout(()=>{
    loadFn(); // load new video mid-blackout
    // Phase 2: fade back in after brief hold (~220ms total)
    setTimeout(()=>{
      veil.style.transition = 'opacity 0.25s ease';
      veil.style.opacity = '0';
      // Restore volume
      if(player?.setVolume) { setTimeout(()=>{ try{ player.setVolume(100); }catch(e){} }, 200); }
    }, 120);
  }, 180);
}

/* ═══ PLAYBACK ════════════════════════════════ */
function startClip(i, auto=true){
  const prevIdx = idx;
  idx=i; setActive();
  document.getElementById('gate').classList.add('gone');
  document.getElementById('done').classList.remove('show');
  const c=vis()[i]; if(!c||!player) return;
  // Mark previous as watched
  const prev=vis()[prevIdx];
  if(prev && auto) markWatched(prev.id);
  if(auto){
    fadeToClip(()=>{
      player.loadVideoById({videoId:c.videoId,startSeconds:c.start});
    });
  }
}
function tick(){
  clearInterval(ticker);
  ticker=setInterval(()=>{
    if(!player?.getCurrentTime) return;
    const c=vis()[idx]; if(!c) return;
    if(player.getCurrentTime()>=c.stop) advance();
  },200);
}
function stopTick(){clearInterval(ticker);ticker=null;}
function advance(){
  stopTick(); const v=vis();
  // Mark current as watched on completion
  const c=v[idx]; if(c) markWatched(c.id);
  // Refresh watched indicators
  document.querySelectorAll('.clip-card').forEach((el,i)=>{
    if(i===idx){ el.classList.add('watched'); const s=el.querySelector('.cside'); if(s&&!s.querySelector('.watched-check')){const d=document.createElement('div');d.className='watched-check';d.textContent='✓';s.appendChild(d);} }
  });
  if(idx+1<v.length){startClip(idx+1);}
  else{player?.pauseVideo();setPlayUI(false);document.getElementById('done').classList.add('show');}
}
function onStateChange(e){
  if(e.data===YT.PlayerState.PLAYING){setPlayUI(true);tick();}
  else if(e.data===YT.PlayerState.PAUSED){setPlayUI(false);stopTick();}
  else if(e.data===YT.PlayerState.ENDED) advance();
}

/* ═══ YOUTUBE ═════════════════════════════════ */
let ytReady=false;
function loadYT(){
  if(ytReady){initPlayer();return;}
  const t=document.createElement('script');t.src='https://www.youtube.com/iframe_api';
  t.onerror=()=>showErr('Could not load YouTube player. Serve over http:// not file://. <a target="_blank" href="https://youtu.be/'+((vis()[0]?.videoId)||'')+'">Open on YouTube</a>');
  document.head.appendChild(t);
}
window.onYouTubeIframeAPIReady=()=>{ytReady=true;if(clips.length)initPlayer();};
function initPlayer(){
  const c=vis()[0]||clips[0]; if(!c||player) return;
  const pv={controls:1,rel:0,playsinline:1,modestbranding:1,start:c.start};
  if(location.protocol.startsWith('http')) pv.origin=location.origin;
  player=new YT.Player('yt-player',{videoId:c.videoId,playerVars:pv,
    events:{onStateChange,onError:e=>showErr('Player error '+e.data)}});
}
function showErr(m){const e=document.getElementById('errStr');e.innerHTML=m;e.style.display='block';}

/* ═══ SWIPE NAVIGATION ════════════════════════ */
let touchStartX=0, touchStartY=0, touchT=0;
const SWIPE_THRESHOLD = 50; // px
const SWIPE_TIME = 400; // ms max

function isFullscreen(){
  return !!(document.fullscreenElement||document.webkitFullscreenElement||document.mozFullScreenElement);
}
function isLandscape(){
  return window.innerWidth > window.innerHeight;
}

// Show swipe hints briefly on first play
let hintShown = false;
function showSwipeHintBriefly(){
  if(hintShown) return; hintShown=true;
  const h=document.getElementById('swipeHint');
  h.classList.add('show');
  setTimeout(()=>h.classList.remove('show'), 1600);
}

document.getElementById('videoWrap').addEventListener('touchstart', e=>{
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchT = Date.now();
}, {passive:true});

document.getElementById('videoWrap').addEventListener('touchend', e=>{
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const dt = Date.now() - touchT;
  if(dt > SWIPE_TIME) return;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);

  const inFS = isFullscreen();
  const inLandscape = isLandscape();

  if(inFS && !inLandscape){
    // Fullscreen portrait: vertical swipe for prev/next
    if(absDy > SWIPE_THRESHOLD && absDy > absDx * 1.2){
      if(dy < 0) navNext();       // swipe up → next
      else        navPrev();       // swipe down → prev
    }
  } else {
    // Landscape FS or normal mode: horizontal swipe
    if(absDx > SWIPE_THRESHOLD && absDx > absDy * 1.2){
      if(dx < 0) navNext();       // swipe left → next
      else        navPrev();       // swipe right → prev
    }
  }
}, {passive:true});

// Also allow horizontal swipe on the clip list area on mobile
document.querySelector('.queue-col')?.addEventListener('touchstart', e=>{
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchT = Date.now();
}, {passive:true});
document.querySelector('.queue-col')?.addEventListener('touchend', e=>{
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const dt = Date.now() - touchT;
  if(dt > SWIPE_TIME) return;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  if(absDx > SWIPE_THRESHOLD*1.5 && absDx > absDy * 2){
    if(dx < 0) navNext(); else navPrev();
  }
}, {passive:true});

function navNext(){
  const v=vis();
  if(idx < v.length-1){ startClip(idx+1); }
}
function navPrev(){
  if(idx > 0){ startClip(idx-1); }
}

/* ═══ BUTTONS ═════════════════════════════════ */
document.getElementById('gate').onclick=()=>{startClip(0);showSwipeHintBriefly();};
document.getElementById('doneReplay').onclick=()=>{idx=0;startClip(0);};
document.getElementById('btnPlay').onclick=()=>{
  if(!player) return;
  if(!isPlaying) player.playVideo(); else player.pauseVideo();
};
document.getElementById('btnPrev').onclick=()=>{if(idx>0)startClip(idx-1);};
document.getElementById('btnNext').onclick=()=>{const v=vis();if(idx<v.length-1)startClip(idx+1);};
window.addEventListener('storage',e=>{if(e.key?.startsWith('srcat_'))refreshData();});

/* ═══ KEYBOARD SHORTCUTS ══════════════════════ */
document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown') navNext();
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp') navPrev();
  else if(e.key===' '){e.preventDefault();document.getElementById('btnPlay').click();}
});

/* ═══ INIT (DIST) ═════════════════════════════ */
(async ()=>{
  // Boot straight into the app — no setup screen in dist
  loadYT();
  await refreshData();
  buildResumeBanner();
})();
